<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dziennik</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family:-apple-system;
  margin:0;
  background:#111;
  color:white;
}

header {
  text-align:center;
  padding:15px;
  font-size:20px;
}

.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  padding:10px;
}

.day {
  padding:10px;
  background:#222;
  border-radius:10px;
  text-align:center;
}

.today { border:2px solid #4CAF50; }

.service {
  background:linear-gradient(135deg,#ff3c00,#ff8800);
}

textarea {
  width:100%;
  height:120px;
  background:#222;
  color:white;
  border:none;
  padding:10px;
}

.controls {
  padding:10px;
}
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header id="monthTitle"></header>

<div class="calendar" id="calendar"></div>

<div class="controls">
  <button onclick="startVoice()">🎤</button>
  <button onclick="saveNote()">💾</button>
  <button onclick="exportData()">📤</button>
</div>

<textarea id="note"></textarea>

<div id="stats" style="padding:10px;"></div>

<script>
let data = JSON.parse(localStorage.getItem("dziennik")||"{}");

let current = new Date();
let selected = new Date();

function format(d){
  return d.toISOString().slice(0,10);
}

// 🔥 AUTOMATYCZNE SŁUŻBY (co 3 dni od startu)
const serviceStart = new Date("2026-05-05");

function isService(day){
  let diff = (day - serviceStart)/(1000*60*60*24);
  return diff >= 0 && diff % 3 === 0;
}

function render(){
  let cal = document.getElementById("calendar");
  cal.innerHTML="";

  let year = current.getFullYear();
  let month = current.getMonth();

  document.getElementById("monthTitle").innerText =
    current.toLocaleDateString("pl-PL",{month:"long",year:"numeric"});

  let days = new Date(year,month+1,0).getDate();

  for(let i=1;i<=days;i++){
    let d = new Date(year,month,i);
    let div = document.createElement("div");
    div.className="day";
    div.innerText=i;

    if(format(d)===format(new Date())) div.classList.add("today");
    if(isService(d)) div.classList.add("service");

    div.onclick=()=>{
      selected=d;
      note.value = data[format(d)]?.text||"";
    };

    cal.appendChild(div);
  }

  calcStats();
}

function saveNote(){
  data[format(selected)] = {text:note.value};
  localStorage.setItem("dziennik",JSON.stringify(data));
}

function startVoice(){
  const r = new webkitSpeechRecognition();
  r.lang="pl-PL";
  r.onresult=e=>{
    note.value += " " + e.results[0][0].transcript;
  };
  r.start();
}

// 📊 STATYSTYKI
function calcStats(){
  let days = Object.keys(data).length;
  let services = 0;

  for(let d in data){
    if(isService(new Date(d))) services++;
  }

  document.getElementById("stats").innerHTML =
    `📊 Wpisy: ${days} | 🔥 Służby: ${services}`;
}

// eksport
function exportData(){
  let blob = new Blob([JSON.stringify(data)],{type:"application/json"});
  let a = document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="dziennik.json";
  a.click();
}

// PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

render();
</script>

</body>
</html>
